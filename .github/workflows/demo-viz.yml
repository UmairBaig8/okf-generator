name: Validate bundle + viz

on:
  push:
    branches: [main]
    paths:
      - 'okf/**'
      - 'tests/fixtures/**'
      - 'pyproject.toml'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - uses: dtolnay/rust-toolchain@stable

      - name: Install deps
        run: pip install -e ".[dev]"

      - name: Generate bundle
        run: okf generate tests/fixtures/realworld /tmp/okf_bundle

      - name: Verify bundle content
        run: |
          CONCEPTS=$(find /tmp/okf_bundle -name '*.md' | wc -l)
          if [ "$CONCEPTS" -lt 10 ]; then
            echo "ERROR: Bundle only has $CONCEPTS concept files (expected >= 10)"
            exit 1
          fi
          echo "Bundle verified: $CONCEPTS concept files"

      - name: Generate viz
        run: okf visualize /tmp/okf_bundle /tmp/viz.html

      - name: Verify viz content
        run: |
          grep -c "View Source" /tmp/viz.html && echo "viz has View Source button"
          grep -c '"code":"' /tmp/viz.html && echo "viz has code embeddings"
